spring:
  application:
    name: atm-platform
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/atm}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
      thread-name-prefix: atm-async-
  thymeleaf:
    prefix: classpath:/email-templates/
    suffix: .html
    cache: false
    check-template-location: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-random-secret-key-at-least-64-bytes-long-please}
    access-token-expiration-ms: ${JWT_ACCESS_EXP_MS:900000}        # 15 minutes
    refresh-token-expiration-ms: ${JWT_REFRESH_EXP_MS:604800000}   # 7 days
    issuer: atm-platform
  security:
    max-failed-attempts: 5
    lock-duration-minutes: 15
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  mail:
    from: ${MAIL_FROM:no-reply@atm.local}
    from-name: ${MAIL_FROM_NAME:ATM Platform}
    enabled: ${MAIL_ENABLED:true}
    admin-recipients: ${MAIL_ADMIN_RECIPIENTS:admin@atm.local,accountant@atm.local}
    card-officer-recipients: ${MAIL_CARD_OFFICER_RECIPIENTS:card.officer@atm.local}
    loan-officer-recipients: ${MAIL_LOAN_OFFICER_RECIPIENTS:loan.officer@atm.local}
  banking:
    daily-transfer-limit: ${DAILY_TRANSFER_LIMIT:100000.00}
    fd-interest-rate: ${FD_INTEREST_RATE:6.50}
    rd-interest-rate: ${RD_INTEREST_RATE:6.00}
    loan-interest:
      personal: 12.50
      education: 9.50
      vehicle: 10.50
      home: 8.50

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.atm: INFO
    org.springframework.security: WARN
