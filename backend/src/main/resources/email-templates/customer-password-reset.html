<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"><title>Password reset</title></head>
<body style="font-family:Arial,sans-serif;color:#222;line-height:1.5">
  <h2 style="color:#0d47a1">Password reset request</h2>
  <p>Hi <span th:text="${name}">Customer</span>,</p>
  <p>We received a request to reset your password. Use the token below within 15 minutes
     to set a new password:</p>
  <pre style="background:#f3f4f6;padding:12px;border-radius:6px;overflow-x:auto" th:text="${resetToken}">token</pre>
  <p>If you did not make this request, you can safely ignore this email.</p>
</body>
</html>
