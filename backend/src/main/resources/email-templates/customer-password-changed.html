<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"><title>Password changed</title></head>
<body style="font-family:Arial,sans-serif;color:#222;line-height:1.5">
  <h2 style="color:#0d47a1">Password updated</h2>
  <p>Hi <span th:text="${name}">Customer</span>,</p>
  <p>Your password has been changed successfully. You may need to sign in again on
     any active devices.</p>
  <p>If you did not make this change, please contact support immediately.</p>
</body>
</html>
