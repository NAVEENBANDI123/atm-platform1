services:
  db:
    image: postgres:16-alpine
    container_name: atm-db
    environment:
      POSTGRES_DB: ${DB_NAME:-atm}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    ports:
      - "5432:5432"
    volumes:
      - atm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-atm} -d ${DB_NAME:-atm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------
  # MailHog - SMTP "sink" + browsable inbox at http://localhost:8025
  # The backend talks to it as host "mail" because containers reach each
  # other by service name on Docker's internal network. localhost INSIDE
  # the backend container would be the backend itself, not your laptop.
  # ---------------------------------------------------------------------
  mail:
    image: mailhog/mailhog:latest
    container_name: atm-mail
    ports:
      - "1025:1025"   # SMTP - so a backend running on the host can also use it
      - "8025:8025"   # Web UI - open this in your browser

  backend:
    build: ./backend
    container_name: atm-backend
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME:-atm}
      DB_PASSWORD: ${DB_PASSWORD:-atm}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-very-long-random-secret-key-at-least-64-bytes-long-please}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081}
      # Mail wiring: deliver to MailHog over the Docker network ("mail" is
      # the service name above, NOT localhost).
      #MAIL_HOST: ${MAIL_HOST:-mail}
      #MAIL_PORT: ${MAIL_PORT:-1025}
      #MAIL_ENABLED: ${MAIL_ENABLED:-true}
      #MAIL_LOG_TO_CONSOLE: ${MAIL_LOG_TO_CONSOLE:-true}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-true}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      MAIL_LOG_TO_CONSOLE: ${MAIL_LOG_TO_CONSOLE:-true}
      # Demo seed (set DEMO_RESET_PASSWORDS=false in any real deployment)
      DEMO_RESET_PASSWORDS: ${DEMO_RESET_PASSWORDS:-true}
      DEMO_DEFAULT_PASSWORD: ${DEMO_DEFAULT_PASSWORD:-password}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build: ./frontend
    container_name: atm-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:80"

volumes:
  atm-db-data:
