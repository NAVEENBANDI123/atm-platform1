services:
  db:
    image: postgres:16-alpine
    container_name: atm-db
    environment:
      POSTGRES_DB: ${DB_NAME:-atm}
      POSTGRES_USER: ${DB_USERNAME:-atm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atm}
    ports:
      - "5432:5432"
    volumes:
      - atm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-atm} -d ${DB_NAME:-atm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------
  # MailHog - dev SMTP "sink" + browsable inbox at http://localhost:8025
  # The backend talks to it as host "mail" (Docker resolves containers by
  # service name on the internal network).
  #
  # To send REAL emails (e.g. via Gmail) instead, set MAIL_HOST=smtp.gmail.com
  # (and the other MAIL_* vars below) in .env. MailHog will simply sit idle.
  # ---------------------------------------------------------------------
  mail:
    image: mailhog/mailhog:latest
    container_name: atm-mail
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web inbox

  backend:
    build: ./backend
    container_name: atm-backend
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME:-atm}
      DB_PASSWORD: ${DB_PASSWORD:-atm}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-very-long-random-secret-key-at-least-64-bytes-long-please}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081}

      # ---- Mail wiring ----
      # Defaults: deliver to the in-network MailHog catcher.
      # For real Gmail delivery, set these in .env:
      #   MAIL_HOST=smtp.gmail.com
      #   MAIL_PORT=587
      #   MAIL_USERNAME=your.address@gmail.com
      #   MAIL_PASSWORD=YOUR_GMAIL_APP_PASSWORD
      #   MAIL_SMTP_AUTH=true
      #   MAIL_SMTP_STARTTLS=true
      #   MAIL_FROM=your.address@gmail.com
      #   MAIL_FROM_NAME=ATM Platform
      MAIL_HOST: ${MAIL_HOST:-mail}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-false}
      MAIL_FROM: ${MAIL_FROM:-no-reply@atm.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ATM Platform}
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      MAIL_LOG_TO_CONSOLE: ${MAIL_LOG_TO_CONSOLE:-true}
      MAIL_ADMIN_RECIPIENTS: ${MAIL_ADMIN_RECIPIENTS:-admin@atm.local,accountant@atm.local}

      # Demo seed (set DEMO_RESET_PASSWORDS=false in any real deployment)
      DEMO_RESET_PASSWORDS: ${DEMO_RESET_PASSWORDS:-true}
      DEMO_DEFAULT_PASSWORD: ${DEMO_DEFAULT_PASSWORD:-password}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build: ./frontend
    container_name: atm-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:80"

volumes:
  atm-db-data:
